<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Squircle Background -->
  <rect x="0" y="0" width="512" height="512" rx="144" fill="#0F172A" />
  
  <!-- Map Pin Group -->
  <g transform="translate(256, 235)">
    <!-- Cyan Pin Shape -->
    <path d="M 0,160 C -120,40 -130,-50 -130,-100 C -130,-171.8 -71.8,-230 0,-230 C 71.8,-230 130,-171.8 130,-100 C 130,-50 120,40 0,160 Z" fill="#06B6D4" />
    
    <!-- Aperture Center (Navy negative space) -->
    <circle cx="0" cy="-100" r="68" fill="#0F172A" />
    
    <!-- 6 Aperture Separator Lines/Blades -->
    <g transform="translate(0, -100)">
      <line x1="0" y1="-68" x2="24" y2="-12" stroke="#0F172A" stroke-width="9" stroke-linecap="round" />
      <line x1="0" y1="-68" x2="24" y2="-12" stroke="#0F172A" stroke-width="9" stroke-linecap="round" transform="rotate(60)" />
      <line x1="0" y1="-68" x2="24" y2="-12" stroke="#0F172A" stroke-width="9" stroke-linecap="round" transform="rotate(120)" />
      <line x1="0" y1="-68" x2="24" y2="-12" stroke="#0F172A" stroke-width="9" stroke-linecap="round" transform="rotate(180)" />
      <line x1="0" y1="-68" x2="24" y2="-12" stroke="#0F172A" stroke-width="9" stroke-linecap="round" transform="rotate(240)" />
      <line x1="0" y1="-68" x2="24" y2="-12" stroke="#0F172A" stroke-width="9" stroke-linecap="round" transform="rotate(300)" />
      
      <!-- Inner hole circle boundary -->
      <circle cx="0" cy="0" r="24" fill="#0F172A" />
    </g>
  </g>
</svg>
